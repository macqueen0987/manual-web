# LAN / production — built images, nginx static frontend, persisted data only.
#   docker compose -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.prod.yml --profile mcp up -d mcp
name: manual-web-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/app.db}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-ko}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: ''
        DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ko}
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    profiles: ["mcp"]
    build:
      context: ./mcp
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${MCP_PORT:-8001}:8001"
    environment:
      - MANUAL_WEB_API_URL=http://backend:8000
      - MANUAL_WEB_EMAIL=${MCP_ADMIN_EMAIL:-mcp-admin@example.com}
      - MANUAL_WEB_PASSWORD=${MCP_ADMIN_PASSWORD:-mcp-dev-password-min-16-chars}
      - MCP_ADMIN_EMAIL=${MCP_ADMIN_EMAIL:-mcp-admin@example.com}
      - MCP_ADMIN_PASSWORD=${MCP_ADMIN_PASSWORD:-mcp-dev-password-min-16-chars}
      - MCP_ADMIN_NAME=${MCP_ADMIN_NAME:-MCP Admin}
      - MCP_BOOTSTRAP_PRODUCT_NAME=${MCP_BOOTSTRAP_PRODUCT_NAME:-MCP Workspace}
      - MCP_BOOTSTRAP_PRODUCT_SLUG=${MCP_BOOTSTRAP_PRODUCT_SLUG:-mcp-workspace}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MCP_TRANSPORT=sse
      - MCP_DATABASE_PATH=/mcp-data/app.db
    volumes:
      - ./:/workspace:ro
      - ./backend/data:/mcp-data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
